version: "3.9"

services:

  # ── Backend Ventas ───────────────────────────────────────────────────────────
  backend-ventas:
    build:
      context: .
      dockerfile: Dockerfile
    image: gonzalo25u/backend-ventas:latest
    container_name: backend-ventas
    restart: unless-stopped
    environment:
      # IP privada de EC2 "data" donde corre MySQL
      DB_ENDPOINT: ${DB_ENDPOINT:-10.0.152.195}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
    ports:
      - "8081:8081"
    volumes:
      # Named volume para logs persistentes del backend
      - ventas_logs:/app/logs
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  # Named volume para persistencia de logs.
  # Se prefiere named volume sobre bind mount por portabilidad y porque
  # Docker gestiona el ciclo de vida sin depender de rutas del host.
  ventas_logs:
    driver: local

networks:
  app-network:
    driver: bridge